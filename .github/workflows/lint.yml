name: Lint and Format

on:
  pull_request:
    branches: [main]
    paths:
      - "**.R"
      - "**.qmd"
      - ".lintr"

permissions:
  contents: write

jobs:
  style:
    name: Format with styler
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-styler-${{ runner.os }}-${{ hashFiles('.github/workflows/lint.yml') }}

      - name: Install styler
        run: install.packages(c("knitr", "styler"))
        shell: Rscript {0}

      - name: Style root directory
        run: styler::style_dir(".")
        shell: Rscript {0}

      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "style: auto-format code with styler"

  lint:
    name: Lint with lintr
    runs-on: ubuntu-latest
    needs: style
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v5
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-lintr-${{ runner.os }}-${{ hashFiles('.github/workflows/lint.yml') }}

      - name: Install lintr
        run: install.packages("lintr")
        shell: Rscript {0}

      - name: Lint root directory
        run: lintr::lint_dir()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
